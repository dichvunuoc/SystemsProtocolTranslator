services:
  opcua-mock-a:
    build:
      context: .
      dockerfile: mock-servers/opcua-mock/Dockerfile
    environment:
      - OPCUA_PORT=4840
      - PUMP_NODES=PUMP_01.Command,PUMP_02.Command
      - SENSOR_NODES=SENSOR_P_01.Value:Double:1.5:3.5,SENSOR_P_02.Value:Double:1.0:2.5,SENSOR_F_01.Value:Double:10.0:50.0,SENSOR_L_01.Value:Double:0.5:5.0,PUMP_01_STATUS.Value:Double:0:1,PUMP_02_STATUS.Value:Double:0:1
    networks:
      - iiot-net

  opcua-mock-b:
    build:
      context: .
      dockerfile: mock-servers/opcua-mock/Dockerfile
    environment:
      - OPCUA_PORT=4840
      - PUMP_NODES=PUMP_03.Command
      - SENSOR_NODES=SENSOR_P_03.Value:Double:1.0:4.0,PUMP_03_STATUS.Value:Double:0:1
    networks:
      - iiot-net

  profinet-mock-a:
    build:
      context: .
      dockerfile: mock-servers/profinet-mock/Dockerfile
    environment:
      PROFINET_PORT: 34964
      DEVICE_NAME: s7-1500-station-a
      TELEMETRY_DEVICES: "PN_TEMP_01:1:1:0:Float32:20:80,PN_PRESSURE_01:1:1:4:Float32:1:10"
      COMMAND_DEVICES: "PN_VALVE_01:2:1:0:Boolean"
    networks:
      - iiot-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - REST_PORT=3000
      - WS_PORT=3001
      - LOG_LEVEL=info
    depends_on:
      - opcua-mock-a
      - opcua-mock-b
      - profinet-mock-a
    networks:
      - iiot-net

networks:
  iiot-net:
    driver: bridge
